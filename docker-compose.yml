services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: php_blog_app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: blog
      DB_USER: blog
      DB_PASSWORD: blog

  mysql:
    image: mysql:8.0
    container_name: php_blog_mysql
    environment:
      MYSQL_DATABASE: blog
      MYSQL_USER: blog
      MYSQL_PASSWORD: blog
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
